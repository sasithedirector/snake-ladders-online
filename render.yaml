services:
  - type: web
    name: snake-ladders-online
    env: node
    plan: free
    buildCommand: "(cd client && npm install && npx vite build) && (cd backend && npm install --production)"
    startCommand: "node backend/src/server.js"
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
